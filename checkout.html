<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Compra — E'D Fashion</title>
  <link rel="stylesheet" href="main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    .checkout-layout {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }

    .checkout-titulo {
      font-size: 24px;
      font-weight: 800;
      color: var(--preto);
      margin-bottom: 20px;
    }

    .passos {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 30px;
      overflow-x: auto;
    }

    .passo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--cinza);
      white-space: nowrap;
    }

    .passo.activo { color: var(--rosa); }
    .passo.concluido { color: var(--verde); }

    .passo-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--cinza-claro);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .passo.activo .passo-num { background: var(--rosa); color: white; }
    .passo.concluido .passo-num { background: var(--verde); color: white; }

    .passo-linha {
      width: 40px;
      height: 2px;
      background: #ddd;
      flex-shrink: 0;
    }

    .passo-linha.activa { background: var(--rosa); }

    .checkout-secao {
      background: white;
      border-radius: 14px;
      box-shadow: var(--sombra);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .checkout-secao-titulo {
      padding: 16px 24px;
      border-bottom: 1px solid #F0F2F5;
      font-size: 15px;
      font-weight: 700;
      color: var(--preto);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkout-secao-corpo { padding: 24px; }

    .grupo-produtos {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .grupo-produtos.stock { border-color: #DCFCE7; }
    .grupo-produtos.encomenda { border-color: #DBEAFE; }
    .grupo-produtos.desmarcado { border-color: #eee; opacity: 0.6; }

    .grupo-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .grupo-header.stock { background: #DCFCE7; }
    .grupo-header.encomenda { background: #DBEAFE; }
    .grupo-header.desmarcado { background: #F5F5F5; }

    .grupo-header-esq {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grupo-titulo {
      font-size: 14px;
      font-weight: 700;
    }

    .grupo-titulo.stock { color: #16A34A; }
    .grupo-titulo.encomenda { color: #2563EB; }

    .grupo-subtotal {
      font-size: 14px;
      font-weight: 700;
      color: var(--preto);
    }

    .grupo-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid currentColor;
      background: white;
      transition: all 0.2s;
    }

    .grupo-toggle.incluir { color: var(--rosa); }
    .grupo-toggle.excluir { color: var(--cinza); }
    .grupo-toggle:hover { opacity: 0.8; }

    .grupo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid #F5F5F5;
      background: white;
    }

    .grupo-item:last-child { border-bottom: none; }

    .grupo-item-img {
      width: 56px;
      height: 70px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--cinza-claro);
      flex-shrink: 0;
    }

    .grupo-item-sem-img {
      width: 56px;
      height: 70px;
      background: var(--cinza-claro);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .grupo-item-info { flex: 1; min-width: 0; }

    .grupo-item-nome {
      font-size: 13px;
      font-weight: 600;
      color: var(--preto);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .grupo-item-qtd {
      font-size: 12px;
      color: var(--cinza);
    }

    .grupo-item-preco {
      font-size: 14px;
      font-weight: 700;
      color: var(--rosa);
      flex-shrink: 0;
    }

    .aviso-misto {
      background: #FEF3C7;
      border: 1px solid #D97706;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #92400E;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .aviso-misto .icone { font-size: 18px; flex-shrink: 0; }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grupo { margin-bottom: 16px; }

    .form-grupo label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-grupo input,
    .form-grupo select,
    .form-grupo textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: var(--fonte);
      background: white;
    }

    .form-grupo input:focus,
    .form-grupo select:focus,
    .form-grupo textarea:focus { border-color: var(--rosa); }

    .metodos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metodo-card {
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .metodo-card:hover { border-color: var(--rosa); }
    .metodo-card.seleccionado { border-color: var(--rosa); background: var(--rosa-claro); }

    .metodo-icone { font-size: 28px; margin-bottom: 6px; display: block; }
    .metodo-nome { font-size: 13px; font-weight: 700; color: var(--preto); }
    .metodo-desc { font-size: 11px; color: var(--cinza); margin-top: 2px; }

    .instrucoes-pagamento {
      background: var(--cinza-claro);
      border-radius: 10px;
      padding: 18px;
      margin-top: 16px;
      display: none;
    }

    .instrucoes-pagamento.visivel { display: block; }

    .instrucoes-pagamento h4 {
      font-size: 14px;
      font-weight: 700;
      color: var(--preto);
      margin-bottom: 12px;
    }

    .instrucao-passo {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .instrucao-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--rosa);
      color: white;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .instrucao-texto {
      font-size: 13px;
      color: var(--cinza-escuro);
      line-height: 1.5;
      padding-top: 2px;
    }

    .instrucao-texto strong { color: var(--preto); }

    .resumo-lateral {
      background: white;
      border-radius: 14px;
      box-shadow: var(--sombra);
      position: sticky;
      top: 80px;
      overflow: hidden;
    }

    .resumo-lateral-header {
      padding: 16px 20px;
      border-bottom: 1px solid #F0F2F5;
    }

    .resumo-lateral-header h3 {
      font-size: 16px;
      font-weight: 700;
    }

    .resumo-lateral-corpo { padding: 20px; }

    .resumo-linha {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--cinza-escuro);
    }

    .resumo-linha.total {
      font-size: 18px;
      font-weight: 800;
      color: var(--preto);
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid #F0F2F5;
      margin-bottom: 0;
    }

    .resumo-linha.total span:last-child { color: var(--rosa); }
    .resumo-linha .desconto { color: #16A34A; font-weight: 600; }

    .btn-confirmar {
      width: 100%;
      padding: 14px;
      background: var(--rosa);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-confirmar:hover { background: #c4186f; transform: translateY(-1px); }
    .btn-confirmar:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .seguranca-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--cinza);
      margin-top: 12px;
      justify-content: center;
    }

    .checkout-sucesso {
      max-width: 560px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .sucesso-icone { font-size: 72px; margin-bottom: 20px; display: block; }

    .sucesso-card {
      background: white;
      border-radius: 16px;
      box-shadow: var(--sombra);
      padding: 40px;
    }

    .sucesso-card h2 {
      font-size: 24px;
      font-weight: 800;
      color: var(--preto);
      margin-bottom: 8px;
    }

    .sucesso-card p {
      font-size: 14px;
      color: var(--cinza);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .numero-encomenda {
      background: var(--rosa-claro);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
    }

    .numero-encomenda span {
      display: block;
      font-size: 12px;
      color: var(--cinza);
      margin-bottom: 4px;
    }

    .numero-encomenda strong {
      font-size: 22px;
      font-weight: 800;
      color: var(--rosa);
    }

    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .resumo-lateral { position: static; }
      .metodos-grid { grid-template-columns: 1fr 1fr; }
      .form-grid-2 { grid-template-columns: 1fr; }
    }

    @media (max-width: 400px) {
      .metodos-grid { grid-template-columns: 1fr 1fr; }
    }

  </style>
</head>
<body>

<div id="navbar"></div>

<div style="max-width:1100px; margin:24px auto; padding:0 20px;">
  <div style="margin-bottom:4px;">
    <a href="carrinho.html" style="color:var(--cinza); font-size:13px; text-decoration:none;">← Voltar ao carrinho</a>
  </div>
  <h1 class="checkout-titulo">✅ Finalizar Compra</h1>

  <div class="passos">
    <div class="passo activo" id="passo1">
      <div class="passo-num">1</div>
      <span>Produtos</span>
    </div>
    <div class="passo-linha activa"></div>
    <div class="passo" id="passo2">
      <div class="passo-num">2</div>
      <span>Entrega</span>
    </div>
    <div class="passo-linha"></div>
    <div class="passo" id="passo3">
      <div class="passo-num">3</div>
      <span>Pagamento</span>
    </div>
    <div class="passo-linha"></div>
    <div class="passo" id="passo4">
      <div class="passo-num">4</div>
      <span>Confirmação</span>
    </div>
  </div>
</div>

<div id="conteudoCheckout"></div>

<div id="footer"></div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script src="components.js"></script>
<script>

  let carrinho = [];
  let cupao = null;
  let desconto = 0;
  let itensSeleccionados = {};
  let metodoPagamento = '';
  let sessaoUser = null;
  let perfilUser = null;
  let isCompraDirecta = false;

  async function iniciar() {
    carregarNavbar();
    carregarFooter();

    const { data: { session } } = await db.auth.getSession();
    if (!session) {
      localStorage.setItem('ed_redirect', window.location.pathname.split('/').pop() + window.location.search);
      window.location.href = 'login.html';
      return;
    }

    sessaoUser = session;

    const { data: perfil } = await db
      .from('profiles')
      .select('*')
      .eq('id', session.user.id)
      .single();

    perfilUser = perfil;

    const params = new URLSearchParams(window.location.search);
    isCompraDirecta = params.get('directa') === 'true';

    if (isCompraDirecta) {
      carrinho = JSON.parse(localStorage.getItem('ed_compra_directa') || '[]');
      cupao = null;
    } else {
      carrinho = JSON.parse(localStorage.getItem('ed_checkout_itens') || '[]');
      cupao = JSON.parse(localStorage.getItem('ed_cupao') || 'null');
    }

    if (carrinho.length === 0) {
      window.location.href = 'carrinho.html';
      return;
    }

    carrinho.forEach((_, idx) => itensSeleccionados[idx] = true);

    calcularDesconto();
    renderCheckout();
  }

  function calcularDesconto() {
    if (!cupao) { desconto = 0; return; }
    const subtotal = calcularSubtotalSeleccionado();
    if (cupao.type === 'percentage') {
      desconto = (subtotal * cupao.value) / 100;
    } else {
      desconto = Math.min(cupao.value, subtotal);
    }
  }

  function calcularSubtotalSeleccionado() {
    return carrinho.reduce((sum, item, idx) => {
      if (itensSeleccionados[idx]) return sum + item.preco * item.quantidade;
      return sum;
    }, 0);
  }

  function getItensSeleccionados() {
    return carrinho.filter((_, idx) => itensSeleccionados[idx]);
  }

  function getItensPorTipo(tipo) {
    return carrinho.map((item, idx) => ({ ...item, idx }))
      .filter(item => item.tipo === tipo);
  }

  function toggleGrupo(tipo, incluir) {
    carrinho.forEach((item, idx) => {
      if (item.tipo === tipo) itensSeleccionados[idx] = incluir;
    });
    calcularDesconto();
    renderCheckout();
  }

  function temMistos() {
    const tipos = [...new Set(carrinho.map(i => i.tipo))];
    return tipos.length > 1;
  }

  function renderCheckout() {
    const itensStock = getItensPorTipo('stock');
    const itensEncomenda = getItensPorTipo('pre_order');
    const seleccionados = getItensSeleccionados();
    const subtotal = calcularSubtotalSeleccionado();
    const total = Math.max(0, subtotal - desconto);

    const grupoStockDesmarcado = itensStock.length > 0 &&
      itensStock.every(i => !itensSeleccionados[i.idx]);
    const grupoEncomendaDesmarcado = itensEncomenda.length > 0 &&
      itensEncomenda.every(i => !itensSeleccionados[i.idx]);

    document.getElementById('conteudoCheckout').innerHTML = `
      <div class="checkout-layout">

        <div>

          <div class="checkout-secao">
            <div class="checkout-secao-titulo">
              🛍️ Produtos Seleccionados
            </div>
            <div class="checkout-secao-corpo">

              ${temMistos() ? `
              <div class="aviso-misto">
                <span class="icone">⚠️</span>
                <div>
                  <strong>O teu carrinho tem dois tipos de produtos.</strong><br>
                  Podes pagar tudo junto ou seleccionar apenas o que queres pagar agora.
                  Produtos <strong>por encomenda</strong> têm prazo de entrega diferente.
                </div>
              </div>` : ''}

              ${itensStock.length > 0 ? `
              <div class="grupo-produtos stock ${grupoStockDesmarcado ? 'desmarcado' : ''}">
                <div class="grupo-header stock ${grupoStockDesmarcado ? 'desmarcado' : ''}">
                  <div class="grupo-header-esq">
                    <span class="grupo-titulo stock">✅ Em Stock — Entrega Imediata</span>
                  </div>
                  <div style="display:flex; align-items:center; gap:12px;">
                    <span class="grupo-subtotal">
                      ${formatMZN(itensStock.filter(i => itensSeleccionados[i.idx]).reduce((s, i) => s + i.preco * i.quantidade, 0))}
                    </span>
                    ${grupoStockDesmarcado
                      ? `<button class="grupo-toggle incluir" onclick="toggleGrupo('stock', true)">✅ Incluir</button>`
                      : `<button class="grupo-toggle excluir" onclick="toggleGrupo('stock', false)">✕ Excluir</button>`}
                  </div>
                </div>
                ${itensStock.map(item => renderGrupoItem(item)).join('')}
              </div>` : ''}

              ${itensEncomenda.length > 0 ? `
              <div class="grupo-produtos encomenda ${grupoEncomendaDesmarcado ? 'desmarcado' : ''}">
                <div class="grupo-header encomenda ${grupoEncomendaDesmarcado ? 'desmarcado' : ''}">
                  <div class="grupo-header-esq">
                    <span class="grupo-titulo encomenda">📦 Por Encomenda — Prazo a Confirmar</span>
                  </div>
                  <div style="display:flex; align-items:center; gap:12px;">
                    <span class="grupo-subtotal">
                      ${formatMZN(itensEncomenda.filter(i => itensSeleccionados[i.idx]).reduce((s, i) => s + i.preco * i.quantidade, 0))}
                    </span>
                    ${grupoEncomendaDesmarcado
                      ? `<button class="grupo-toggle incluir" onclick="toggleGrupo('pre_order', true)">✅ Incluir</button>`
                      : `<button class="grupo-toggle excluir" onclick="toggleGrupo('pre_order', false)">✕ Excluir</button>`}
                  </div>
                </div>
                ${itensEncomenda.map(item => renderGrupoItem(item)).join('')}
                ${!grupoEncomendaDesmarcado ? `
                <div style="padding:12px 18px; background:#EFF6FF; font-size:12px; color:#2563EB;">
                  ℹ️ Para produtos por encomenda, a E'D Fashion entrará em contacto para confirmar o prazo e o adiantamento necessário.
                </div>` : ''}
              </div>` : ''}

              ${seleccionados.length === 0 ? `
              <div style="text-align:center; padding:30px; color:var(--cinza);">
                <p>Nenhum produto seleccionado. Inclui pelo menos um grupo para continuar.</p>
              </div>` : ''}

            </div>
          </div>

          <div class="checkout-secao">
            <div class="checkout-secao-titulo">📍 Dados de Entrega</div>
            <div class="checkout-secao-corpo">
              <div class="form-grid-2">
                <div class="form-grupo">
                  <label>Nome Completo *</label>
                  <input type="text" id="entNome"
                    value="${perfilUser?.full_name || ''}"
                    placeholder="Nome de quem recebe">
                </div>
                <div class="form-grupo">
                  <label>Telefone *</label>
                  <input type="tel" id="entTelefone"
                    value="${perfilUser?.phone || ''}"
                    placeholder="+258 84 000 0000">
                </div>
              </div>
              <div class="form-grupo">
                <label>Bairro / Zona *</label>
                <input type="text" id="entBairro" placeholder="Ex: Ponta Gêa, Chaimite, Munhava...">
              </div>
              <div class="form-grid-2">
                <div class="form-grupo">
                  <label>Cidade *</label>
                  <input type="text" id="entCidade" value="Beira" placeholder="Cidade">
                </div>
                <div class="form-grupo">
                  <label>Província</label>
                  <select id="entProvincia">
                    <option value="Sofala" selected>Sofala</option>
                    <option value="Maputo">Maputo</option>
                    <option value="Gaza">Gaza</option>
                    <option value="Inhambane">Inhambane</option>
                    <option value="Manica">Manica</option>
                    <option value="Tete">Tete</option>
                    <option value="Zambezia">Zambézia</option>
                    <option value="Nampula">Nampula</option>
                    <option value="Cabo Delgado">Cabo Delgado</option>
                    <option value="Niassa">Niassa</option>
                  </select>
                </div>
              </div>
              <div class="form-grupo">
                <label>Notas / Referência de Entrega</label>
                <textarea id="entNotas" rows="2"
                  placeholder="Ex: Perto da escola X, portão azul, ligar antes de chegar..."></textarea>
              </div>
            </div>
          </div>

          <div class="checkout-secao">
            <div class="checkout-secao-titulo">💳 Método de Pagamento</div>
            <div class="checkout-secao-corpo">

              <div class="metodos-grid">
                <div class="metodo-card" id="metodo-mpesa" onclick="seleccionarMetodo('mpesa')">
                  <span class="metodo-icone">📱</span>
                  <div class="metodo-nome">M-Pesa</div>
                  <div class="metodo-desc">Vodacom M-Pesa</div>
                </div>
                <div class="metodo-card" id="metodo-emola" onclick="seleccionarMetodo('emola')">
                  <span class="metodo-icone">💳</span>
                  <div class="metodo-nome">e-Mola</div>
                  <div class="metodo-desc">Movitel e-Mola</div>
                </div>
                <div class="metodo-card" id="metodo-bank_transfer" onclick="seleccionarMetodo('bank_transfer')">
                  <span class="metodo-icone">🏦</span>
                  <div class="metodo-nome">Transferência</div>
                  <div class="metodo-desc">Banco / NIB</div>
                </div>
                <div class="metodo-card" id="metodo-cash" onclick="seleccionarMetodo('cash')">
                  <span class="metodo-icone">💵</span>
                  <div class="metodo-nome">Dinheiro</div>
                  <div class="metodo-desc">Pagamento presencial</div>
                </div>
              </div>

              <div class="instrucoes-pagamento" id="instrucoesPagamento"></div>

            </div>
          </div>

          <div class="msg-erro" id="msgErro"></div>
          <div class="msg-sucesso" id="msgSucesso"></div>

        </div>

        <div class="resumo-lateral">
          <div class="resumo-lateral-header">
            <h3>📋 Resumo do Pedido</h3>
          </div>
          <div class="resumo-lateral-corpo">

            <div class="resumo-linha">
              <span>Itens seleccionados</span>
              <span>${seleccionados.length}</span>
            </div>
            <div class="resumo-linha">
              <span>Subtotal</span>
              <span>${formatMZN(subtotal)}</span>
            </div>
            ${desconto > 0 ? `
            <div class="resumo-linha">
              <span>Desconto ${cupao ? '(' + cupao.code + ')' : ''}</span>
              <span class="desconto">− ${formatMZN(desconto)}</span>
            </div>` : ''}
            <div class="resumo-linha">
              <span>Entrega</span>
              <span style="color:var(--verde); font-weight:600;">A combinar</span>
            </div>
            <div class="resumo-linha total">
              <span>Total</span>
              <span>${formatMZN(total)}</span>
            </div>

            ${cupao ? `
            <div style="background:var(--verde-claro); border-radius:8px; padding:10px; margin-top:12px; font-size:12px; color:#16A34A; font-weight:600;">
              ✅ Cupão ${cupao.code} aplicado
            </div>` : ''}

            <button class="btn-confirmar" onclick="confirmarEncomenda()" id="btnConfirmar"
              ${seleccionados.length === 0 ? 'disabled' : ''}>
              🎉 Confirmar Encomenda
            </button>

            <div class="seguranca-info">
              🔒 Compra segura e protegida
            </div>

          </div>
        </div>

      </div>`;
  }

  function renderGrupoItem(item) {
    return `
      <div class="grupo-item">
        ${item.imagem
          ? `<img src="${item.imagem}" class="grupo-item-img" alt="${item.nome}"
               onerror="this.style.display='none'">`
          : `<div class="grupo-item-sem-img">👗</div>`}
        <div class="grupo-item-info">
          <div class="grupo-item-nome">${item.nome}</div>
          <div class="grupo-item-qtd">Quantidade: ${item.quantidade}</div>
        </div>
        <div class="grupo-item-preco">${formatMZN(item.preco * item.quantidade)}</div>
      </div>`;
  }

  function seleccionarMetodo(metodo) {
    metodoPagamento = metodo;
    document.querySelectorAll('.metodo-card').forEach(c => c.classList.remove('seleccionado'));
    document.getElementById('metodo-' + metodo)?.classList.add('seleccionado');
    mostrarInstrucoes(metodo);
  }

  function mostrarInstrucoes(metodo) {
    const total = formatMZN(Math.max(0, calcularSubtotalSeleccionado() - desconto));
    const instrucoes = {
      mpesa: {
        titulo: '📱 Como pagar por M-Pesa',
        passos: [
          'Abre o menu M-Pesa no teu telemóvel Vodacom',
          'Selecciona <strong>Enviar Dinheiro</strong>',
          `Introduz o número: <strong>86 646 4666</strong>`,
          `Introduz o valor: <strong>${total}</strong>`,
          'Confirma com o teu PIN M-Pesa',
          'Guarda o comprovativo (screenshot) e envia-nos via WhatsApp'
        ]
      },
      emola: {
        titulo: '💳 Como pagar por e-Mola',
        passos: [
          'Abre o menu e-Mola no teu telemóvel Movitel',
          'Selecciona <strong>Transferência</strong>',
          `Introduz o número: <strong>86 646 4666</strong>`,
          `Introduz o valor: <strong>${total}</strong>`,
          'Confirma com o teu PIN e-Mola',
          'Guarda o comprovativo (screenshot) e envia-nos via WhatsApp'
        ]
      },
      bank_transfer: {
        titulo: '🏦 Como pagar por Transferência Bancária',
        passos: [
          'Acede ao teu banco ou internet banking',
          'Selecciona <strong>Transferência / TPA</strong>',
          'Banco: <strong>BCI</strong> — NIB: <strong>0008 0000 00000000 00</strong>',
          'Nome: <strong>E\'D Fashion</strong>',
          `Valor: <strong>${total}</strong>`,
          'Guarda o comprovativo e envia-nos via WhatsApp ou email'
        ]
      },
      cash: {
        titulo: '💵 Pagamento em Dinheiro',
        passos: [
          'Confirma a tua encomenda aqui no site',
          'Entraremos em contacto via WhatsApp para combinar',
          `Prepara o valor de <strong>${total}</strong> em notas`,
          'O pagamento é feito no momento da entrega ou levantamento',
          'Localização: <strong>6º Bairro Esturro, Beira</strong>'
        ]
      }
    };

    const info = instrucoes[metodo];
    if (!info) return;

    const div = document.getElementById('instrucoesPagamento');
    div.innerHTML = `
      <h4>${info.titulo}</h4>
      ${info.passos.map((p, i) => `
        <div class="instrucao-passo">
          <div class="instrucao-num">${i + 1}</div>
          <div class="instrucao-texto">${p}</div>
        </div>`).join('')}`;
    div.classList.add('visivel');
  }

  async function confirmarEncomenda() {
    esconderMensagem('msgErro');
    esconderMensagem('msgSucesso');

    const seleccionados = getItensSeleccionados();
    if (seleccionados.length === 0) {
      mostrarErro('msgErro', 'Selecciona pelo menos um produto para continuar.');
      return;
    }

    const nome = document.getElementById('entNome').value.trim();
    const telefone = document.getElementById('entTelefone').value.trim();
    const bairro = document.getElementById('entBairro').value.trim();
    const cidade = document.getElementById('entCidade').value.trim();

    if (!nome) { mostrarErro('msgErro', 'Introduz o nome de quem recebe.'); return; }
    if (!telefone) { mostrarErro('msgErro', 'Introduz o telefone de contacto.'); return; }
    if (!bairro) { mostrarErro('msgErro', 'Introduz o bairro ou zona de entrega.'); return; }
    if (!cidade) { mostrarErro('msgErro', 'Introduz a cidade.'); return; }
    if (!metodoPagamento) { mostrarErro('msgErro', 'Selecciona um método de pagamento.'); return; }

    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true;
    btn.textContent = 'A processar...';

    const subtotal = calcularSubtotalSeleccionado();
    const total = Math.max(0, subtotal - desconto);

    const morada = {
      nome,
      telefone,
      bairro,
      cidade,
      provincia: document.getElementById('entProvincia').value,
      notas: document.getElementById('entNotas').value.trim()
    };

    const numeroEncomenda = 'ED-' + new Date().getFullYear() + '-' +
      String(Date.now()).slice(-6);

    const { data: encomenda, error: errEncomenda } = await db
      .from('orders')
      .insert({
        order_number: numeroEncomenda,
        user_id: sessaoUser.user.id,
        status: 'awaiting_payment',
        shipping_address: morada,
        subtotal,
        discount: desconto,
        total
      })
      .select()
      .single();

    if (errEncomenda) {
      mostrarErro('msgErro', 'Erro ao criar encomenda. Tenta novamente.');
      btn.disabled = false;
      btn.textContent = '🎉 Confirmar Encomenda';
      return;
    }

    const itens = seleccionados.map(item => ({
      order_id: encomenda.id,
      product_id: item.id,
      quantity: item.quantidade,
      unit_price: item.preco,
      availability_type: item.tipo
    }));

    await db.from('order_items').insert(itens);

    await db.from('payments').insert({
      order_id: encomenda.id,
      method: metodoPagamento,
      amount: total,
      status: 'pending'
    });

    await db.from('order_status_history').insert({
      order_id: encomenda.id,
      old_status: null,
      new_status: 'awaiting_payment',
      changed_by: sessaoUser.user.id,
      notes: 'Encomenda criada pelo cliente'
    });

    for (const item of seleccionados.filter(i => i.tipo === 'stock')) {
      const { data: stockActual } = await db
        .from('product_stock')
        .select('quantity')
        .eq('product_id', item.id)
        .single();

      if (stockActual) {
        const novaQtd = Math.max(0, stockActual.quantity - item.quantidade);
        await db.from('product_stock')
          .update({ quantity: novaQtd, updated_at: new Date().toISOString() })
          .eq('product_id', item.id);
      }
    }

    if (cupao) {
      await db.from('coupons')
        .update({ used_count: (cupao.used_count || 0) + 1 })
        .eq('id', cupao.id);
    }

    // Limpar carrinho/compra directa e cupão
    if (isCompraDirecta) {
      localStorage.removeItem('ed_compra_directa');
    } else {
      const idsComprados = seleccionados.map(i => i.id);
      const carrinhoCompleto = JSON.parse(localStorage.getItem('ed_carrinho') || '[]');
      const carrinhoRestante = carrinhoCompleto.filter(i => !idsComprados.includes(i.id));
      localStorage.setItem('ed_carrinho', JSON.stringify(carrinhoRestante));
    }
    localStorage.removeItem('ed_cupao');
    localStorage.removeItem('ed_checkout_itens');
    atualizarContadorCarrinho();

    mostrarSucesso(encomenda, metodoPagamento, total);
  }

  function mostrarSucesso(encomenda, metodo, total) {
    const whatsappMsg = encodeURIComponent(
      `Olá E'D Fashion! 👋\n\n` +
      `Acabei de fazer uma encomenda no vosso site.\n\n` +
      `*Nº Encomenda:* ${encomenda.order_number}\n` +
      `*Total:* ${formatMZN(total)}\n` +
      `*Pagamento:* ${traduzirMetodo(metodo)}\n\n` +
      `Estou a enviar o comprovativo em seguida. 📎`
    );

    document.getElementById('conteudoCheckout').innerHTML = `
      <div class="checkout-sucesso">
        <span class="sucesso-icone">🎉</span>
        <div class="sucesso-card">
          <h2>Encomenda Confirmada!</h2>
          <p>A tua encomenda foi registada com sucesso. Segue as instruções abaixo para concluir o pagamento.</p>

          <div class="numero-encomenda">
            <span>Número da tua encomenda</span>
            <strong>${encomenda.order_number}</strong>
          </div>

          <p style="font-size:13px; color:var(--cinza-escuro); margin-bottom:20px;">
            📱 Após efectuares o pagamento por <strong>${traduzirMetodo(metodo)}</strong>,
            envia o comprovativo via WhatsApp para confirmarmos e processarmos a tua encomenda.
          </p>

          <div style="background:#F0F7E6; border:1px solid var(--verde); border-radius:12px; padding:16px; margin-bottom:16px; font-size:13px; color:#16A34A; line-height:1.6; text-align:left;">
            <strong>✅ O que fazer agora:</strong><br>
            1. Clica em "Enviar Comprovativo" abaixo<br>
            2. Envia o screenshot do pagamento no WhatsApp<br>
            3. Aguarda a nossa confirmação (normalmente em poucos minutos)<br>
            4. Receberás uma mensagem quando a encomenda for processada
          </div>

          <div style="display:flex; flex-direction:column; gap:12px;">
            <a href="https://wa.me/258866464666?text=${whatsappMsg}"
               target="_blank"
               style="display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; border-radius:25px; background:#25D366; color:white; font-weight:700; text-decoration:none; font-size:15px;">
              💬 Enviar Comprovativo via WhatsApp
            </a>

            <a href="encomendas-cliente.html"
               style="display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-radius:25px; background:var(--rosa); color:white; font-weight:700; text-decoration:none; font-size:14px;">
              📦 Acompanhar a Minha Encomenda
            </a>

            <a href="index.html"
               style="display:block; text-align:center; padding:12px; color:var(--cinza); text-decoration:none; font-size:13px;">
              Continuar a comprar →
            </a>
          </div>
        </div>
      </div>`;
  }

  function traduzirMetodo(metodo) {
    const map = {
      mpesa: 'M-Pesa',
      emola: 'e-Mola',
      bank_transfer: 'Transferência Bancária',
      cash: 'Dinheiro'
    };
    return map[metodo] || metodo;
  }

  iniciar();
</script>
