<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — E'D Fashion</title>
  <link rel="stylesheet" href="main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: var(--cinza-claro); min-height: 100vh; }

    .top-bar {
      background: white;
      box-shadow: var(--sombra);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar a { color: var(--cinza); font-size: 22px; text-decoration: none; }
    .top-bar h1 { font-size: 18px; font-weight: 700; color: var(--preto); }

    .perfil-container {
      max-width: 560px;
      margin: 36px auto;
      padding: 0 20px;
    }

    /* HEADER / AVATAR */
    .perfil-header {
      background: white;
      border-radius: 16px;
      padding: 30px 24px 24px;
      text-align: center;
      box-shadow: var(--sombra);
      margin-bottom: 20px;
    }

    .avatar-wrap {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 14px;
    }

    .avatar-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--rosa);
      background: var(--rosa-claro);
      display: block;
    }

    .avatar-fallback {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--rosa-claro);
      border: 3px solid var(--rosa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: var(--rosa);
    }

    .avatar-edit-btn {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--rosa);
      color: white;
      font-size: 12px;
      border: 2px solid white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .avatar-edit-btn:hover { background: #c4186f; }

    .perfil-nome-display {
      font-size: 20px;
      font-weight: 800;
      color: var(--preto);
      margin-bottom: 4px;
    }

    .perfil-email-display {
      font-size: 13px;
      color: var(--cinza);
      margin-bottom: 10px;
    }

    .perfil-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-admin    { background: #FEF3C7; color: #D97706; }
    .badge-employee { background: #DBEAFE; color: #2563EB; }
    .badge-customer { background: var(--rosa-claro); color: var(--rosa); }

    /* CARD */
    .perfil-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--sombra);
      margin-bottom: 20px;
    }

    .perfil-card h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--preto);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--cinza-claro);
    }

    .form-grupo { margin-bottom: 14px; }

    .form-grupo label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-grupo input,
    .form-grupo textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: var(--fonte);
      background: white;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-grupo input:focus,
    .form-grupo textarea:focus { border-color: var(--rosa); }

    .form-grupo input[readonly] {
      background: var(--cinza-claro);
      color: var(--cinza);
      cursor: default;
    }

    .campo-email-info {
      font-size: 11px;
      color: var(--cinza);
      margin-top: 4px;
    }

    .btn-salvar {
      width: 100%;
      padding: 12px;
      background: var(--rosa);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-salvar:hover { background: #c4186f; }
    .btn-salvar:disabled { background: #ccc; cursor: not-allowed; }

    /* MENU */
    .perfil-menu {
      background: white;
      border-radius: 16px;
      box-shadow: var(--sombra);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .perfil-menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--cinza-claro);
      text-decoration: none;
      color: var(--preto);
      transition: background 0.2s;
    }
    .perfil-menu-item:last-child { border-bottom: none; }
    .perfil-menu-item:hover { background: var(--cinza-claro); }

    .perfil-menu-item .icone {
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--rosa-claro);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .admin-link .icone { background: #FEF3C7; }

    .perfil-menu-item .texto { flex: 1; font-size: 14px; font-weight: 600; }
    .perfil-menu-item .texto span { display: block; font-size: 12px; color: var(--cinza); font-weight: 400; }
    .perfil-menu-item .seta { color: var(--cinza); }

    .btn-logout {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--cinza);
      border: 2px solid #ddd;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ff4444; color: #ff4444; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html">←</a>
  <h1>Meu Perfil</h1>
</div>

<div class="perfil-container">

  <div class="msg-erro" id="msgErro"></div>
  <div class="msg-sucesso" id="msgSucesso"></div>

  <!-- HEADER -->
  <div class="perfil-header">
    <div class="avatar-wrap">
      <img id="avatarImg" class="avatar-img" style="display:none"
        onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex'">
      <div id="avatarFallback" class="avatar-fallback">👤</div>
      <button class="avatar-edit-btn" title="Alterar foto" onclick="document.getElementById('inputFoto').click()">✎</button>
    </div>
    <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="alterarFoto(event)">
    <div class="perfil-nome-display" id="perfilNome">A carregar...</div>
    <div class="perfil-email-display" id="perfilEmail"></div>
    <span class="perfil-badge" id="perfilBadge"></span>
  </div>

  <!-- EDITAR DADOS -->
  <div class="perfil-card">
    <h3>✏️ Editar Dados</h3>

    <div class="form-grupo">
      <label>Nome Completo</label>
      <input type="text" id="editNome" placeholder="O teu nome completo">
    </div>

    <div class="form-grupo">
      <label>Telefone</label>
      <input type="tel" id="editTelefone" placeholder="+258 84 000 0000">
    </div>

    <div class="form-grupo">
      <label>Endereço / Bairro</label>
      <input type="text" id="editEndereco" placeholder="Ex: 6º Bairro Esturro, Beira">
    </div>

    <div class="form-grupo">
      <label>Email</label>
      <input type="email" id="editEmail" readonly>
      <div class="campo-email-info">🔒 O email é o teu login e não pode ser alterado aqui.</div>
    </div>

    <button class="btn-salvar" id="btnSalvar" onclick="salvarPerfil()">
      Guardar Alterações
    </button>
  </div>

  <!-- MENU -->
  <div class="perfil-menu">
    <a href="encomendas-cliente.html" class="perfil-menu-item">
      <div class="icone">📦</div>
      <div class="texto">
        As Minhas Encomendas
        <span>Ver histórico de compras</span>
      </div>
      <div class="seta">›</div>
    </a>
  </div>

  <!-- ADMIN -->
  <div class="perfil-menu" id="menuAdmin" style="display:none">
    <a href="admin.html" class="perfil-menu-item admin-link">
      <div class="icone">⚙️</div>
      <div class="texto">
        Painel Administrativo
        <span>Gerir a loja</span>
      </div>
      <div class="seta">›</div>
    </a>
  </div>

  <!-- LOGOUT -->
  <div class="perfil-card">
    <button class="btn-logout" onclick="fazerLogout()">🚪 Terminar Sessão</button>
  </div>

</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>

  let utilizadorActual = null;

  // ── MD5 simples para Gravatar ──────────────────────────────
  function md5(str) {
    // Implementação compacta de MD5 para gerar hash do email (Gravatar)
    function safeAdd(x, y) {
      const lsw = (x & 0xFFFF) + (y & 0xFFFF);
      const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
      return (msw << 16) | (lsw & 0xFFFF);
    }
    function bitRotateLeft(num, cnt) { return (num << cnt) | (num >>> (32 - cnt)); }
    function md5cmn(q, a, b, x, s, t) { return safeAdd(bitRotateLeft(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b); }
    function md5ff(a,b,c,d,x,s,t){return md5cmn((b&c)|((~b)&d),a,b,x,s,t);}
    function md5gg(a,b,c,d,x,s,t){return md5cmn((b&d)|(c&(~d)),a,b,x,s,t);}
    function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
    function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|(~d)),a,b,x,s,t);}
    function strToBytes(s) {
      const bytes = [];
      for (let i = 0; i < s.length; i++) {
        const c = s.charCodeAt(i);
        if (c < 128) bytes.push(c);
        else if (c < 2048) { bytes.push((c>>6)|192); bytes.push((c&63)|128); }
        else { bytes.push((c>>12)|224); bytes.push(((c>>6)&63)|128); bytes.push((c&63)|128); }
      }
      return bytes;
    }
    function bytesToWords(bytes) {
      const words = new Int32Array(Math.ceil(bytes.length / 4));
      for (let i = 0; i < bytes.length; i++) words[i>>2] |= bytes[i] << ((i%4)*8);
      return words;
    }
    const bytes = strToBytes(str);
    const len = bytes.length * 8;
    bytes.push(0x80);
    while (bytes.length % 64 !== 56) bytes.push(0);
    bytes.push(len & 0xFF); bytes.push((len>>8)&0xFF); bytes.push((len>>16)&0xFF); bytes.push((len>>24)&0xFF);
    bytes.push(0);bytes.push(0);bytes.push(0);bytes.push(0);
    const M = bytesToWords(bytes);
    let a=1732584193,b=-271733879,c=-1732584194,d=271733878;
    for (let i = 0; i < M.length; i += 16) {
      const [aa,bb,cc,dd]=[a,b,c,d];
      a=md5ff(a,b,c,d,M[i+0],7,-680876936);d=md5ff(d,a,b,c,M[i+1],12,-389564586);c=md5ff(c,d,a,b,M[i+2],17,606105819);b=md5ff(b,c,d,a,M[i+3],22,-1044525330);
      a=md5ff(a,b,c,d,M[i+4],7,-176418897);d=md5ff(d,a,b,c,M[i+5],12,1200080426);c=md5ff(c,d,a,b,M[i+6],17,-1473231341);b=md5ff(b,c,d,a,M[i+7],22,-45705983);
      a=md5ff(a,b,c,d,M[i+8],7,1770035416);d=md5ff(d,a,b,c,M[i+9],12,-1958414417);c=md5ff(c,d,a,b,M[i+10],17,-42063);b=md5ff(b,c,d,a,M[i+11],22,-1990404162);
      a=md5ff(a,b,c,d,M[i+12],7,1804603682);d=md5ff(d,a,b,c,M[i+13],12,-40341101);c=md5ff(c,d,a,b,M[i+14],17,-1502002290);b=md5ff(b,c,d,a,M[i+15],22,1236535329);
      a=md5gg(a,b,c,d,M[i+1],5,-165796510);d=md5gg(d,a,b,c,M[i+6],9,-1069501632);c=md5gg(c,d,a,b,M[i+11],14,643717713);b=md5gg(b,c,d,a,M[i+0],20,-373897302);
      a=md5gg(a,b,c,d,M[i+5],5,-701558691);d=md5gg(d,a,b,c,M[i+10],9,38016083);c=md5gg(c,d,a,b,M[i+15],14,-660478335);b=md5gg(b,c,d,a,M[i+4],20,-405537848);
      a=md5gg(a,b,c,d,M[i+9],5,568446438);d=md5gg(d,a,b,c,M[i+14],9,-1019803690);c=md5gg(c,d,a,b,M[i+3],14,-187363961);b=md5gg(b,c,d,a,M[i+8],20,1163531501);
      a=md5gg(a,b,c,d,M[i+13],5,-1444681467);d=md5gg(d,a,b,c,M[i+2],9,-51403784);c=md5gg(c,d,a,b,M[i+7],14,1735328473);b=md5gg(b,c,d,a,M[i+12],20,-1926607734);
      a=md5hh(a,b,c,d,M[i+5],4,-378558);d=md5hh(d,a,b,c,M[i+8],11,-2022574463);c=md5hh(c,d,a,b,M[i+11],16,1839030562);b=md5hh(b,c,d,a,M[i+14],23,-35309556);
      a=md5hh(a,b,c,d,M[i+1],4,-1530992060);d=md5hh(d,a,b,c,M[i+4],11,1272893353);c=md5hh(c,d,a,b,M[i+7],16,-155497632);b=md5hh(b,c,d,a,M[i+10],23,-1094730640);
      a=md5hh(a,b,c,d,M[i+13],4,681279174);d=md5hh(d,a,b,c,M[i+0],11,-358537222);c=md5hh(c,d,a,b,M[i+3],16,-722521979);b=md5hh(b,c,d,a,M[i+6],23,76029189);
      a=md5hh(a,b,c,d,M[i+9],4,-640364487);d=md5hh(d,a,b,c,M[i+12],11,-421815835);c=md5hh(c,d,a,b,M[i+15],16,530742520);b=md5hh(b,c,d,a,M[i+2],23,-995338651);
      a=md5ii(a,b,c,d,M[i+0],6,-198630844);d=md5ii(d,a,b,c,M[i+7],10,1126891415);c=md5ii(c,d,a,b,M[i+14],15,-1416354905);b=md5ii(b,c,d,a,M[i+5],21,-57434055);
      a=md5ii(a,b,c,d,M[i+12],6,1700485571);d=md5ii(d,a,b,c,M[i+3],10,-1894986606);c=md5ii(c,d,a,b,M[i+10],15,-1051523);b=md5ii(b,c,d,a,M[i+1],21,-2054922799);
      a=md5ii(a,b,c,d,M[i+8],6,1873313359);d=md5ii(d,a,b,c,M[i+15],10,-30611744);c=md5ii(c,d,a,b,M[i+6],15,-1560198380);b=md5ii(b,c,d,a,M[i+13],21,1309151649);
      a=md5ii(a,b,c,d,M[i+4],6,-145523070);d=md5ii(d,a,b,c,M[i+11],10,-1120210379);c=md5ii(c,d,a,b,M[i+2],15,718787259);b=md5ii(b,c,d,a,M[i+9],21,-343485551);
      a=safeAdd(a,aa);b=safeAdd(b,bb);c=safeAdd(c,cc);d=safeAdd(d,dd);
    }
    return [a,b,c,d].map(n => {
      let hex = '';
      for (let j = 0; j < 4; j++) hex += ('0' + ((n>>(j*8))&0xFF).toString(16)).slice(-2);
      return hex;
    }).join('');
  }

  function gravatarUrl(email, size = 90) {
    const hash = md5(email.trim().toLowerCase());
    return `https://www.gravatar.com/avatar/${hash}?s=${size}&d=404`;
  }

  // ── CARREGAR PERFIL ────────────────────────────────────────
  async function carregarPerfil() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    utilizadorActual = session.user;
    const email = session.user.email;

    const { data: perfil, error } = await db
      .from('profiles')
      .select('*')
      .eq('id', session.user.id)
      .single();

    if (error || !perfil) {
      mostrarErro('msgErro', 'Erro ao carregar perfil.');
      return;
    }

    // Avatar: foto guardada → Gravatar → inicial
    const fotoGuardada = perfil.avatar_url || null;
    const avatarImg = document.getElementById('avatarImg');
    const avatarFallback = document.getElementById('avatarFallback');

    if (fotoGuardada) {
      avatarImg.src = fotoGuardada;
      avatarImg.style.display = 'block';
      avatarFallback.style.display = 'none';
    } else {
      // Tenta Gravatar
      const grav = gravatarUrl(email);
      avatarImg.src = grav;
      avatarImg.style.display = 'block';
      avatarImg.onerror = () => {
        avatarImg.style.display = 'none';
        avatarFallback.style.display = 'flex';
        avatarFallback.textContent = (perfil.full_name || 'U').charAt(0).toUpperCase();
      };
    }

    // Header
    document.getElementById('perfilNome').textContent = perfil.full_name || 'Sem nome';
    document.getElementById('perfilEmail').textContent = email;

    // Badge
    const badge = document.getElementById('perfilBadge');
    const roles = {
      admin:    ['badge-admin',    '⭐ Administrador'],
      employee: ['badge-employee', '👔 Funcionário'],
      customer: ['badge-customer', '🛍️ Cliente']
    };
    const [cls, label] = roles[perfil.role] || roles.customer;
    badge.textContent = label;
    badge.className = 'perfil-badge ' + cls;

    if (['admin', 'employee'].includes(perfil.role)) {
      document.getElementById('menuAdmin').style.display = 'block';
    }

    // Formulário
    document.getElementById('editNome').value = perfil.full_name || '';
    document.getElementById('editTelefone').value = perfil.phone || '';
    document.getElementById('editEndereco').value = perfil.address || '';
    document.getElementById('editEmail').value = email;
  }

  // ── ALTERAR FOTO ───────────────────────────────────────────
  async function alterarFoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) {
      mostrarErro('msgErro', 'A imagem não pode ter mais de 3 MB.');
      return;
    }

    const ext = file.name.split('.').pop();
    const nomeFile = `avatar_${utilizadorActual.id}.${ext}`;

    const { error: uploadErr } = await db.storage
      .from('produtos')
      .upload(nomeFile, file, { upsert: true });

    if (uploadErr) {
      mostrarErro('msgErro', 'Erro ao enviar imagem.');
      return;
    }

    const { data: urlData } = db.storage.from('produtos').getPublicUrl(nomeFile);
    const url = urlData.publicUrl;

    await db.from('profiles').update({ avatar_url: url }).eq('id', utilizadorActual.id);

    const avatarImg = document.getElementById('avatarImg');
    const avatarFallback = document.getElementById('avatarFallback');
    avatarImg.src = url + '?t=' + Date.now();
    avatarImg.style.display = 'block';
    avatarFallback.style.display = 'none';

    mostrarSucesso('msgSucesso', '✅ Foto actualizada!');
    setTimeout(() => esconderMensagem('msgSucesso'), 3000);
  }

  // ── SALVAR PERFIL ──────────────────────────────────────────
  async function salvarPerfil() {
    const nome = document.getElementById('editNome').value.trim();
    const telefone = document.getElementById('editTelefone').value.trim();
    const endereco = document.getElementById('editEndereco').value.trim();
    const btn = document.getElementById('btnSalvar');

    esconderMensagem('msgErro');
    esconderMensagem('msgSucesso');

    if (!nome) {
      mostrarErro('msgErro', 'O nome não pode estar vazio.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'A guardar...';

    const { error } = await db
      .from('profiles')
      .update({ full_name: nome, phone: telefone, address: endereco })
      .eq('id', utilizadorActual.id);

    if (error) {
      mostrarErro('msgErro', 'Erro ao guardar. Tenta novamente.');
    } else {
      mostrarSucesso('msgSucesso', '✅ Perfil actualizado com sucesso!');
      document.getElementById('perfilNome').textContent = nome;
      // Atualizar fallback se necessário
      const fb = document.getElementById('avatarFallback');
      if (fb.style.display !== 'none') fb.textContent = nome.charAt(0).toUpperCase();
    }

    btn.disabled = false;
    btn.textContent = 'Guardar Alterações';
  }

  // ── LOGOUT ─────────────────────────────────────────────────
  async function fazerLogout() {
    await db.auth.signOut();
    window.location.href = 'login.html';
  }

  carregarPerfil();
</script>

</body>
</html>
