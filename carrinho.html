<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho — E'D Fashion</title>
  <link rel="stylesheet" href="main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    .carrinho-layout {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }

    .carrinho-titulo {
      font-size: 24px;
      font-weight: 800;
      color: var(--preto);
      margin-bottom: 20px;
    }

    .carrinho-itens {
      background: white;
      border-radius: 14px;
      box-shadow: var(--sombra);
      overflow: hidden;
    }

    .carrinho-header {
      padding: 16px 24px;
      border-bottom: 1px solid #F0F2F5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .carrinho-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--preto);
    }

    .carrinho-header-acoes {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .selecionar-tudo-btn {
      font-size: 12px;
      color: var(--rosa);
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 0;
    }

    .selecionar-tudo-btn:hover { text-decoration: underline; }

    .limpar-carrinho {
      font-size: 12px;
      color: var(--cinza);
      cursor: pointer;
      font-weight: 600;
      background: none;
      border: none;
    }

    .limpar-carrinho:hover { color: #DC2626; }

    .carrinho-item {
      display: flex;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #F0F2F5;
      align-items: flex-start;
      transition: background 0.2s;
    }

    .carrinho-item:last-child { border-bottom: none; }
    .carrinho-item.seleccionado { background: #FFF8FC; }

    /* CHECKBOX PERSONALIZADO */
    .item-checkbox-wrap {
      flex-shrink: 0;
      padding-top: 18px;
    }

    .item-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #ddd;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .item-checkbox.marcado {
      background: var(--rosa);
      border-color: var(--rosa);
    }

    .item-checkbox.marcado::after {
      content: '✓';
      color: white;
      font-size: 13px;
      font-weight: 800;
    }

    .item-imagem {
      width: 80px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--cinza-claro);
      flex-shrink: 0;
    }

    .item-sem-imagem {
      width: 80px;
      height: 100px;
      background: var(--cinza-claro);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-nome {
      font-size: 14px;
      font-weight: 600;
      color: var(--preto);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-tipo {
      font-size: 11px;
      color: var(--cinza);
      margin-bottom: 10px;
    }

    .item-tipo.encomenda { color: var(--verde); font-weight: 600; }

    .item-preco {
      font-size: 16px;
      font-weight: 800;
      color: var(--rosa);
      margin-bottom: 10px;
    }

    .item-controlo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .quantidade-controlo {
      display: flex;
      align-items: center;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .qtd-btn {
      width: 32px;
      height: 32px;
      background: var(--cinza-claro);
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      color: var(--preto);
    }

    .qtd-btn:hover { background: #ddd; }

    .qtd-valor {
      width: 40px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--preto);
      border: none;
      outline: none;
      background: white;
    }

    .item-subtotal {
      font-size: 13px;
      color: var(--cinza);
    }

    .item-remover {
      background: none;
      border: none;
      color: var(--cinza);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
      padding: 4px 0;
    }

    .item-remover:hover { color: #DC2626; }

    /* GUARDAR PARA DEPOIS */
    .item-guardar {
      background: none;
      border: none;
      color: var(--cinza);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
      padding: 4px 0;
    }

    .item-guardar:hover { color: var(--rosa); }

    /* SECÇÃO GUARDADOS PARA DEPOIS */
    .guardados-secao {
      background: white;
      border-radius: 14px;
      box-shadow: var(--sombra);
      margin-top: 20px;
      overflow: hidden;
    }

    .guardados-header {
      padding: 14px 24px;
      border-bottom: 1px solid #F0F2F5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .guardados-header h4 {
      font-size: 14px;
      font-weight: 700;
      color: var(--cinza-escuro);
    }

    .guardados-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid #F0F2F5;
    }

    .guardados-item:last-child { border-bottom: none; }

    .guardados-img {
      width: 52px;
      height: 65px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--cinza-claro);
      flex-shrink: 0;
    }

    .guardados-info { flex: 1; min-width: 0; }
    .guardados-nome { font-size: 13px; font-weight: 600; color: var(--preto); margin-bottom: 4px; }
    .guardados-preco { font-size: 13px; color: var(--rosa); font-weight: 700; }

    .btn-mover-carrinho {
      background: var(--rosa-claro);
      color: var(--rosa);
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-mover-carrinho:hover { background: var(--rosa); color: white; }

    /* VAZIO */
    .carrinho-vazio {
      background: white;
      border-radius: 14px;
      box-shadow: var(--sombra);
      padding: 60px 20px;
      text-align: center;
    }

    .carrinho-vazio .icone { font-size: 64px; display: block; margin-bottom: 16px; }
    .carrinho-vazio h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .carrinho-vazio p { font-size: 14px; color: var(--cinza); margin-bottom: 24px; }

    /* RESUMO */
    .carrinho-resumo {
      background: white;
      border-radius: 14px;
      box-shadow: var(--sombra);
      position: sticky;
      top: 80px;
      overflow: hidden;
    }

    .resumo-header {
      padding: 16px 20px;
      border-bottom: 1px solid #F0F2F5;
    }

    .resumo-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--preto);
    }

    .resumo-corpo { padding: 20px; }

    /* INFO SELECÇÃO */
    .resumo-selecao-info {
      background: var(--cinza-claro);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--cinza-escuro);
      text-align: center;
    }

    .resumo-selecao-info strong { color: var(--rosa); }

    .resumo-linha {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--cinza-escuro);
    }

    .resumo-linha.total {
      font-size: 18px;
      font-weight: 800;
      color: var(--preto);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid #F0F2F5;
      margin-bottom: 0;
    }

    .resumo-linha.total span:last-child { color: var(--rosa); }
    .resumo-linha .desconto { color: #16A34A; font-weight: 600; }

    /* CUPÃO */
    .cupao-wrap { margin-bottom: 20px; }

    .cupao-wrap label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .cupao-input-wrap {
      display: flex;
      gap: 0;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .cupao-input-wrap:focus-within { border-color: var(--rosa); }

    .cupao-input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: var(--fonte);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cupao-btn {
      padding: 10px 16px;
      background: var(--rosa);
      color: white;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .cupao-btn:hover { background: #c4186f; }

    .cupao-aplicado {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #DCFCE7;
      border: 1px solid #16A34A;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #16A34A;
      font-weight: 600;
    }

    .cupao-remover {
      background: none;
      border: none;
      color: #16A34A;
      cursor: pointer;
      font-size: 16px;
    }

    /* BOTÕES */
    .btn-finalizar {
      width: 100%;
      padding: 14px;
      background: var(--rosa);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-finalizar:hover { background: #c4186f; transform: translateY(-1px); }
    .btn-finalizar:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .btn-continuar {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--cinza-escuro);
      border: 1.5px solid #ddd;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .btn-continuar:hover { border-color: var(--rosa); color: var(--rosa); }

    .metodos-pagamento {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .metodo-badge {
      background: var(--cinza-claro);
      color: var(--cinza);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    /* AVISO NENHUM SELECCIONADO */
    .aviso-selecao {
      background: #FEF3C7;
      border: 1px solid #D97706;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #92400E;
      margin-bottom: 12px;
      text-align: center;
      display: none;
    }

    .aviso-selecao.visivel { display: block; }

    @media (max-width: 768px) {
      .carrinho-layout { grid-template-columns: 1fr; }
      .carrinho-resumo { position: static; }
      .carrinho-item { flex-wrap: wrap; padding: 16px; }
    }

  </style>
</head>
<body>

<div id="navbar"></div>

<div style="max-width:1100px; margin:24px auto; padding:0 20px;">
  <div style="margin-bottom:4px;">
    <a href="catalogo.html" style="color:var(--cinza); font-size:13px; text-decoration:none;">← Continuar a comprar</a>
  </div>
  <h1 class="carrinho-titulo">🛒 O Meu Carrinho</h1>
</div>

<div id="conteudoCarrinho">
  <div style="text-align:center; padding:60px 20px; color:var(--cinza);">
    <div style="font-size:40px; margin-bottom:12px;">⏳</div>
    <p>A carregar carrinho...</p>
  </div>
</div>

<div id="footer"></div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script src="components.js"></script>
<script>

  let carrinho = [];
  let guardados = [];
  let seleccionados = new Set(); // índices dos itens marcados
  let cupaoActivo = null;
  let desconto = 0;

  async function iniciar() {
    carregarNavbar();
    carregarFooter();
    carrinho = JSON.parse(localStorage.getItem('ed_carrinho') || '[]');
    guardados = JSON.parse(localStorage.getItem('ed_guardados') || '[]');
    // Nenhum item marcado por defeito
    seleccionados = new Set();
    await sincronizarPrecos();
    renderCarrinho();
  }

  async function sincronizarPrecos() {
    if (carrinho.length === 0) return;
    const ids = carrinho.map(i => i.id);
    const { data } = await db
      .from('products')
      .select('id, name, price, sale_price, image_url, status, availability_type')
      .in('id', ids);

    if (!data) return;

    carrinho = carrinho.map(item => {
      const prod = data.find(p => p.id === item.id);
      if (!prod || prod.status !== 'active') return null;
      return {
        ...item,
        nome: prod.name,
        preco: prod.sale_price && prod.sale_price < prod.price ? prod.sale_price : prod.price,
        imagem: prod.image_url || '',
        tipo: prod.availability_type
      };
    }).filter(Boolean);

    guardarCarrinho();
  }

  function calcularSubtotal() {
    let total = 0;
    seleccionados.forEach(idx => {
      if (carrinho[idx]) total += carrinho[idx].preco * carrinho[idx].quantidade;
    });
    return total;
  }

  function recalcularDesconto() {
    if (!cupaoActivo) { desconto = 0; return; }
    const subtotal = calcularSubtotal();
    if (cupaoActivo.type === 'percentage') {
      desconto = (subtotal * cupaoActivo.value) / 100;
    } else {
      desconto = Math.min(cupaoActivo.value, subtotal);
    }
  }

  function toggleItem(idx) {
    if (seleccionados.has(idx)) {
      seleccionados.delete(idx);
    } else {
      seleccionados.add(idx);
    }
    recalcularDesconto();
    renderCarrinho();
  }

  function selecionarTodos() {
    if (seleccionados.size === carrinho.length) {
      seleccionados = new Set();
    } else {
      seleccionados = new Set(carrinho.map((_, i) => i));
    }
    recalcularDesconto();
    renderCarrinho();
  }

  function renderCarrinho() {
    const container = document.getElementById('conteudoCarrinho');

    if (carrinho.length === 0 && guardados.length === 0) {
      container.innerHTML = `
        <div style="max-width:1100px; margin:0 auto; padding:0 20px;">
          <div class="carrinho-vazio">
            <span class="icone">🛒</span>
            <h3>O teu carrinho está vazio</h3>
            <p>Ainda não adicionaste nenhum produto ao carrinho.</p>
            <a href="catalogo.html" class="btn btn-rosa">🛍️ Ver Produtos</a>
          </div>
        </div>`;
      return;
    }

    const subtotal = calcularSubtotal();
    const total = Math.max(0, subtotal - desconto);
    const numSeleccionados = seleccionados.size;
    const todosSeleccionados = seleccionados.size === carrinho.length && carrinho.length > 0;

    container.innerHTML = `
      <div class="carrinho-layout">

        <!-- ITENS -->
        <div>
          ${carrinho.length > 0 ? `
          <div class="carrinho-itens">
            <div class="carrinho-header">
              <h3>${carrinho.length} produto(s) no carrinho</h3>
              <div class="carrinho-header-acoes">
                <button class="selecionar-tudo-btn" onclick="selecionarTodos()">
                  ${todosSeleccionados ? '✕ Desmarcar tudo' : '✓ Seleccionar tudo'}
                </button>
                <button class="limpar-carrinho" onclick="limparCarrinho()">🗑️ Limpar</button>
              </div>
            </div>
            ${carrinho.map((item, idx) => renderItem(item, idx)).join('')}
          </div>` : ''}

          ${guardados.length > 0 ? `
          <div class="guardados-secao">
            <div class="guardados-header">
              <h4>📌 Guardados para Depois (${guardados.length})</h4>
            </div>
            ${guardados.map((item, idx) => renderGuardado(item, idx)).join('')}
          </div>` : ''}
        </div>

        <!-- RESUMO -->
        <div class="carrinho-resumo">
          <div class="resumo-header">
            <h3>📋 Resumo do Pedido</h3>
          </div>
          <div class="resumo-corpo">

            <div class="resumo-selecao-info">
              ${numSeleccionados === 0
                ? '☝️ Selecciona os produtos que queres pagar'
                : `<strong>${numSeleccionados}</strong> produto(s) seleccionado(s) para pagamento`}
            </div>

            <!-- Cupão -->
            <div class="cupao-wrap">
              <label>Código de Cupão</label>
              ${cupaoActivo
                ? `<div class="cupao-aplicado">
                    <span>✅ ${cupaoActivo.code} — ${cupaoActivo.type === 'percentage' ? cupaoActivo.value + '%' : formatMZN(cupaoActivo.value)} de desconto</span>
                    <button class="cupao-remover" onclick="removerCupao()">×</button>
                  </div>`
                : `<div class="cupao-input-wrap">
                    <input type="text" class="cupao-input" id="cupaoInput" placeholder="CÓDIGO" maxlength="20">
                    <button class="cupao-btn" onclick="aplicarCupao()">Aplicar</button>
                  </div>`}
              <div class="msg-erro" id="msgErroCupao" style="margin-top:6px;"></div>
              <div class="msg-sucesso" id="msgSucessoCupao" style="margin-top:6px;"></div>
            </div>

            <div class="resumo-linha">
              <span>Subtotal (seleccionados)</span>
              <span>${formatMZN(subtotal)}</span>
            </div>
            ${desconto > 0
              ? `<div class="resumo-linha">
                  <span>Desconto</span>
                  <span class="desconto">− ${formatMZN(desconto)}</span>
                </div>`
              : ''}
            <div class="resumo-linha">
              <span>Entrega</span>
              <span style="color:var(--verde); font-weight:600;">A combinar</span>
            </div>
            <div class="resumo-linha total">
              <span>Total</span>
              <span>${formatMZN(total)}</span>
            </div>

            <div style="margin-top:20px;">
              <div class="aviso-selecao ${numSeleccionados === 0 ? 'visivel' : ''}">
                ⚠️ Selecciona pelo menos um produto para continuar
              </div>
              <button class="btn-finalizar" onclick="finalizarCompra()" id="btnFinalizar"
                ${numSeleccionados === 0 ? 'disabled' : ''}>
                ✅ Finalizar Compra (${numSeleccionados})
              </button>
              <a href="catalogo.html" class="btn-continuar">← Continuar a Comprar</a>
            </div>

            <div class="metodos-pagamento">
              <span class="metodo-badge">M-Pesa</span>
              <span class="metodo-badge">e-Mola</span>
              <span class="metodo-badge">Transferência</span>
              <span class="metodo-badge">Dinheiro</span>
            </div>

          </div>
        </div>

      </div>`;
  }

  function renderItem(item, idx) {
    const marcado = seleccionados.has(idx);
    const subtotalItem = item.preco * item.quantidade;

    return `
      <div class="carrinho-item ${marcado ? 'seleccionado' : ''}">

        <!-- CHECKBOX -->
        <div class="item-checkbox-wrap">
          <div class="item-checkbox ${marcado ? 'marcado' : ''}" onclick="toggleItem(${idx})"></div>
        </div>

        <!-- IMAGEM -->
        ${item.imagem
          ? `<img src="${item.imagem}" class="item-imagem" alt="${item.nome}"
               onerror="this.style.display='none'">`
          : `<div class="item-sem-imagem">👗</div>`}

        <!-- INFO -->
        <div class="item-info">
          <div class="item-nome">${item.nome}</div>
          <div class="item-tipo ${item.tipo === 'pre_order' ? 'encomenda' : ''}">
            ${item.tipo === 'pre_order' ? '📦 Por Encomenda' : '✅ Em Stock'}
          </div>
          <div class="item-preco">${formatMZN(item.preco)}</div>

          <div class="item-controlo">
            <div class="quantidade-controlo">
              <button class="qtd-btn" onclick="alterarQuantidade(${idx}, -1)">−</button>
              <span class="qtd-valor">${item.quantidade}</span>
              <button class="qtd-btn" onclick="alterarQuantidade(${idx}, 1)">+</button>
            </div>
            <span class="item-subtotal">= ${formatMZN(subtotalItem)}</span>
          </div>

          <div style="display:flex; gap:16px; margin-top:10px;">
            <button class="item-guardar" onclick="guardarParaDepois(${idx})">
              📌 Guardar para depois
            </button>
            <button class="item-remover" onclick="removerItem(${idx})">
              🗑️ Remover
            </button>
          </div>
        </div>

      </div>`;
  }

  function renderGuardado(item, idx) {
    return `
      <div class="guardados-item">
        ${item.imagem
          ? `<img src="${item.imagem}" class="guardados-img" alt="${item.nome}"
               onerror="this.style.display='none'">`
          : `<div class="guardados-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;">👗</div>`}
        <div class="guardados-info">
          <div class="guardados-nome">${item.nome}</div>
          <div class="guardados-preco">${formatMZN(item.preco)}</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <button class="btn-mover-carrinho" onclick="moverParaCarrinho(${idx})">
            🛒 Mover para Carrinho
          </button>
          <button class="item-remover" onclick="removerGuardado(${idx})"
            style="justify-content:center; font-size:11px;">
            🗑️ Remover
          </button>
        </div>
      </div>`;
  }

  function alterarQuantidade(idx, delta) {
    carrinho[idx].quantidade = Math.max(1, carrinho[idx].quantidade + delta);
    guardarCarrinho();
    recalcularDesconto();
    renderCarrinho();
  }

  function removerItem(idx) {
    seleccionados.delete(idx);
    // Reindexar seleccionados após remoção
    const novosSel = new Set();
    seleccionados.forEach(i => { if (i > idx) novosSel.add(i - 1); else if (i < idx) novosSel.add(i); });
    seleccionados = novosSel;
    carrinho.splice(idx, 1);
    guardarCarrinho();
    recalcularDesconto();
    renderCarrinho();
  }

  function guardarParaDepois(idx) {
    const item = carrinho[idx];
    guardados.push(item);
    localStorage.setItem('ed_guardados', JSON.stringify(guardados));
    removerItem(idx);
  }

  function moverParaCarrinho(idx) {
    const item = guardados[idx];
    carrinho.push(item);
    guardados.splice(idx, 1);
    guardarCarrinho();
    localStorage.setItem('ed_guardados', JSON.stringify(guardados));
    renderCarrinho();
  }

  function removerGuardado(idx) {
    guardados.splice(idx, 1);
    localStorage.setItem('ed_guardados', JSON.stringify(guardados));
    renderCarrinho();
  }

  function limparCarrinho() {
    if (!confirm('Tens a certeza que queres limpar o carrinho?')) return;
    carrinho = [];
    seleccionados = new Set();
    cupaoActivo = null;
    desconto = 0;
    guardarCarrinho();
    renderCarrinho();
  }

  function guardarCarrinho() {
    localStorage.setItem('ed_carrinho', JSON.stringify(carrinho));
    atualizarContadorCarrinho();
  }

  // CUPÃO
  async function aplicarCupao() {
    const codigo = document.getElementById('cupaoInput')?.value?.trim().toUpperCase();
    esconderMensagem('msgErroCupao');
    esconderMensagem('msgSucessoCupao');

    if (!codigo) {
      mostrarErro('msgErroCupao', 'Introduz um código de cupão.');
      return;
    }

    if (seleccionados.size === 0) {
      mostrarErro('msgErroCupao', 'Selecciona pelo menos um produto antes de aplicar o cupão.');
      return;
    }

    const { data: cupao, error } = await db
      .from('coupons')
      .select('*')
      .eq('code', codigo)
      .eq('is_active', true)
      .single();

    if (error || !cupao) {
      mostrarErro('msgErroCupao', 'Cupão inválido ou expirado.');
      return;
    }

    const agora = new Date();
    if (cupao.valid_until && new Date(cupao.valid_until) < agora) {
      mostrarErro('msgErroCupao', 'Este cupão já expirou.');
      return;
    }

    if (cupao.usage_limit && cupao.used_count >= cupao.usage_limit) {
      mostrarErro('msgErroCupao', 'Este cupão já atingiu o limite de utilizações.');
      return;
    }

    const subtotal = calcularSubtotal();
    if (cupao.min_order_value && subtotal < cupao.min_order_value) {
      mostrarErro('msgErroCupao', `Este cupão requer um mínimo de ${formatMZN(cupao.min_order_value)}.`);
      return;
    }

    cupaoActivo = cupao;
    recalcularDesconto();
    renderCarrinho();
  }

  function removerCupao() {
    cupaoActivo = null;
    desconto = 0;
    renderCarrinho();
  }

  // FINALIZAR
  async function finalizarCompra() {
    if (seleccionados.size === 0) return;

    const { data: { session } } = await db.auth.getSession();
    if (!session) {
      localStorage.setItem('ed_redirect', 'checkout.html');
      window.location.href = 'login.html';
      return;
    }

    // Guardar apenas os itens seleccionados para o checkout
    const itensParaCheckout = [...seleccionados].map(idx => carrinho[idx]);
    localStorage.setItem('ed_checkout_itens', JSON.stringify(itensParaCheckout));

    if (cupaoActivo) {
      localStorage.setItem('ed_cupao', JSON.stringify(cupaoActivo));
    } else {
      localStorage.removeItem('ed_cupao');
    }

    window.location.href = 'checkout.html';
  }

  iniciar();
</script>

</body>
</html>
