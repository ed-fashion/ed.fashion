<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Password — E'D Fashion</title>
  <link rel="stylesheet" href="main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--rosa-claro) 0%, var(--verde-claro) 100%);
    }

    .auth-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      margin: 20px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo img { height: 80px; }

    .auth-titulo {
      font-size: 20px;
      font-weight: 700;
      color: var(--preto);
      margin-bottom: 6px;
    }

    .auth-subtitulo {
      font-size: 13px;
      color: var(--cinza);
      margin-bottom: 24px;
    }

    .btn-auth {
      width: 100%;
      padding: 12px;
      background: var(--rosa);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-auth:hover { background: #c4186f; }
    .btn-auth:disabled { background: #ccc; cursor: not-allowed; }

    .erro-container {
      text-align: center;
      padding: 20px 0;
    }

    .erro-container .icone {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }
  </style>
</head>
<body>

<div class="auth-container">

  <div class="auth-logo">
    <a href="index.html">
      <img src="logo.png" alt="E'D Fashion">
    </a>
  </div>

  <div class="msg-erro" id="msgErro"></div>
  <div class="msg-sucesso" id="msgSucesso"></div>

  <!-- Formulário nova password -->
  <div id="formNova">
    <p class="auth-titulo">Nova Password 🔑</p>
    <p class="auth-subtitulo">Escolhe uma nova password para a tua conta</p>

    <div class="form-grupo">
      <label>Nova Password</label>
      <input type="password" id="novaPassword" placeholder="Mínimo 6 caracteres">
    </div>

    <div class="form-grupo">
      <label>Confirmar Password</label>
      <input type="password" id="confirmarPassword" placeholder="Repete a nova password">
    </div>

    <button class="btn-auth" onclick="definirPassword()" id="btnDefinir">
      Guardar Nova Password
    </button>
  </div>

  <!-- Erro de link inválido -->
  <div id="erroLink" style="display:none">
    <div class="erro-container">
      <span class="icone">⚠️</span>
      <p class="auth-titulo">Link inválido ou expirado</p>
      <p class="auth-subtitulo">Este link de recuperação já não é válido. Pede um novo.</p>
      <a href="login.html" class="btn-auth" style="display:block; text-align:center; text-decoration:none; margin-top:16px">
        Voltar ao Login
      </a>
    </div>
  </div>

</div>

<script src="supabase.js"></script>
<script src="utils.js"></script>
<script>

  // Verificar se há sessão válida vinda do link de email
  async function verificarToken() {
    // O Supabase processa automaticamente o token do URL
    const { data: { session }, error } = await db.auth.getSession();

    if (error || !session) {
      document.getElementById('formNova').style.display = 'none';
      document.getElementById('erroLink').style.display = 'block';
      return;
    }
  }

  async function definirPassword() {
    const nova = document.getElementById('novaPassword').value;
    const confirmar = document.getElementById('confirmarPassword').value;
    const btn = document.getElementById('btnDefinir');

    esconderMensagem('msgErro');
    esconderMensagem('msgSucesso');

    if (!nova || !confirmar) {
      mostrarErro('msgErro', 'Preenche os dois campos.');
      return;
    }

    if (nova.length < 6) {
      mostrarErro('msgErro', 'A password deve ter pelo menos 6 caracteres.');
      return;
    }

    if (nova !== confirmar) {
      mostrarErro('msgErro', 'As passwords não coincidem.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'A guardar...';

    const { error } = await db.auth.updateUser({ password: nova });

    if (error) {
      mostrarErro('msgErro', 'Erro ao guardar. O link pode ter expirado.');
      btn.disabled = false;
      btn.textContent = 'Guardar Nova Password';
      return;
    }

    mostrarSucesso('msgSucesso', '✅ Password alterada com sucesso!');
    btn.disabled = false;
    btn.textContent = 'Guardar Nova Password';

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  }

  verificarToken();
</script>

</body>
</html>
